<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Slot | RemoteScope</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <canvas id="stars-canvas"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-satellite"></i> RemoteScope</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="booking.html" class="active">Book Now</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="booking-container">
        <!-- Left Column: Booking Form -->
        <div class="booking-form-panel">
            <h1>Configure Your Session</h1>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Your Email</label>
                <input type="email" id="user-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-telescope"></i> Telescope Package</label>
                <select id="equipment-select" onchange="updatePrice()">
                    <option value="redcat51" data-price="500">RedCat 51 – ₹500/hr</option>
                    <option value="esprit120" data-price="600">Esprit 120 – ₹600/hr</option>
                    <option value="rasa8" data-price="800">RASA 8 – ₹800/hr</option>
                    <option value="tak-fsq106" data-price="1000">Takahashi FSQ-106 – ₹1000/hr</option>
                </select>
                <!-- Telescope image preview -->
                <img id="equipment-image" src="" alt="Telescope" style="display:none; width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:1rem;">
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> Camera</label>
                <select id="camera-select" onchange="updatePrice()">
                    <option value="asi290mc" data-price="0">ASI290MC (included)</option>
                    <option value="asi2600mc" data-price="200">ASI2600MC Pro (+₹200/hr)</option>
                    <option value="asi6200mm" data-price="400">ASI6200MM Pro (+₹400/hr)</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-filter"></i> Filters (₹100/hr each)</label>
                <div class="filter-checkboxes">
                    <label><input type="checkbox" value="lrgb" onchange="updatePrice()"> LRGB</label>
                    <label><input type="checkbox" value="ha" onchange="updatePrice()"> H‑α</label>
                    <label><input type="checkbox" value="oiii" onchange="updatePrice()"> OIII</label>
                    <label><input type="checkbox" value="sii" onchange="updatePrice()"> SII</label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Date</label>
                <input type="date" id="booking-date" min="" onchange="updatePrice()">
            </div>
            <div class="time-range">
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Start Time (IST, after 6 PM)</label>
                    <input type="time" id="start-time" min="18:00" max="23:59" step="3600" onchange="updatePrice()">
                </div>
                <div class="form-group">
                    <label>End Time (before 6 AM next day)</label>
                    <input type="time" id="end-time" min="00:00" max="06:00" step="3600" onchange="updatePrice()">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-cog"></i> Advanced</label>
                <label class="checkbox-option"><input type="checkbox" id="dither" onchange="updatePrice()"> Dithering (+₹50/hr)</label>
            </div>

            <div class="price-display" id="price-box">
                <h2>Total: ₹<span id="total-price">0</span></h2>
                <p id="session-duration">Duration: 0 hours</p>
            </div>

            <div class="payment-section">
                <img src="upi-qr.png" alt="UPI QR" class="qr-code">
                <a href="#" id="upi-link" class="btn-primary">Pay via UPI</a>
            </div>

            <button class="btn-primary full-width" onclick="submitBookingAPI()">Confirm Booking</button>
            <div id="api-message" style="margin-top:1rem; text-align:center;"></div>
        </div>

        <!-- Right Column: Weather Panel -->
        <div class="weather-panel" id="weather-panel">
            <h2><i class="fas fa-cloud-sun"></i> Spiti Weather</h2>
            <div class="weather-grid" id="weather-grid"></div>
            <p style="font-size:0.7rem; text-align:center; margin-top:0.5rem; color:var(--text-secondary);">Data: Open-Meteo</p>
        </div>
    </div>

    <footer>
        <p>© 2026 RemoteScope. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // ========== Telescope image mapping ==========
        const equipmentImages = {
            'redcat51': 'images/redcat51.jpg',
            'esprit120': 'images/esprit120.jpg',
            'rasa8': 'images/rasa8.jpg',
            'tak-fsq106': 'images/tak-fsq106.jpg'
        };

        // Update price AND show/hide equipment image
        const originalUpdatePrice = updatePrice; // keep reference to existing function (defined in script.js)
        updatePrice = function() {
            originalUpdatePrice(); // call existing price logic
            const equipSelect = document.getElementById('equipment-select');
            const img = document.getElementById('equipment-image');
            const selectedValue = equipSelect.value;
            if (equipmentImages[selectedValue]) {
                img.src = equipmentImages[selectedValue];
                img.onerror = () => {
    // If image fails, show a placeholder icon instead
    img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150"><rect width="200" height="150" fill="%23111"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23999" font-size="18" font-family="Arial">Telescope</text></svg>';
    img.onerror = null; // prevent infinite loop
};
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        };

        // After page load, trigger once to set initial image (if any)
        window.addEventListener('DOMContentLoaded', () => {
            // ensure updatePrice runs after all elements are ready
            if (document.getElementById('equipment-select')) {
                updatePrice();
            }
        });

        // ========== Real-time Booking API Submission ==========
        const BOOKING_API_URL = 'https://ayush-dell-g15-5520.tail96dcc4.ts.net:10000/book'; // <-- REPLACE with your actual Funnel URL

        function submitBookingAPI() {
            const email = document.getElementById('user-email').value.trim();
            const date = document.getElementById('booking-date').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const msgDiv = document.getElementById('api-message');

            if (!email || !date || !startTime || !endTime) {
                msgDiv.textContent = '❌ Please fill in all fields.';
                return;
            }

            const start = new Date(`${date}T${startTime}:00`);
            let end = new Date(`${date}T${endTime}:00`);
            if (end <= start) end.setDate(end.getDate() + 1);
            const duration = (end - start) / (1000 * 60 * 60);
            if (duration <= 0) {
                msgDiv.textContent = '❌ End time must be after start time.';
                return;
            }

            // Gather selected equipment details
            const equipSelect = document.getElementById('equipment-select');
            const telescopeValue = equipSelect.value;
            const telescopeName = equipSelect.options[equipSelect.selectedIndex].text;
            const cameraSelect = document.getElementById('camera-select');
            const cameraValue = cameraSelect.value;
            const cameraName = cameraSelect.options[cameraSelect.selectedIndex].text;
            const filterCheckboxes = document.querySelectorAll('.filter-checkboxes input:checked');
            const filters = Array.from(filterCheckboxes).map(cb => cb.value.toUpperCase());
            const dithering = document.getElementById('dither').checked;

            msgDiv.textContent = '⏳ Processing booking…';

            const payload = {
                email: email,
                date: date,
                start_time: startTime,
                duration: duration.toString(),
                telescope: telescopeValue,
                telescope_name: telescopeName,
                camera: cameraValue,
                camera_name: cameraName,
                filters: filters,
                dithering: dithering
            };

            fetch(BOOKING_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    msgDiv.textContent = '❌ ' + data.error;
                } else {
                    msgDiv.textContent = '✅ Booking confirmed! Check your email for access details.';
                }
            })
            .catch(error => {
                msgDiv.textContent = '❌ Network error. Please try again.';
                console.error(error);
            });
        }
    </script>
</body>
</html>
