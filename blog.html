    <script src="script.js"></script>
    <script>
// ---------- SPACE NEWS PAGINATION ----------
const ARTICLES_PER_PAGE = 12;
const MAX_PAGES = 40;
const BASE_URL = 'https://api.spaceflightnewsapi.net/v4/articles/';
const blogContainer = document.getElementById('blog-container');
const paginationTop = document.getElementById('pagination-top');
const paginationBottom = document.getElementById('pagination-bottom');

let currentPage = 1;

// 1. Loading spinner
function showSpinner() {
    blogContainer.innerHTML = `
        <div class="spinner-wrapper">
            <div class="spinner"></div>
            <p>Loading articles…</p>
        </div>`;
}

// 2. Fetch a single page
async function fetchPage(page) {
    showSpinner();
    const offset = (page - 1) * ARTICLES_PER_PAGE;
    const url = `${BASE_URL}?limit=${ARTICLES_PER_PAGE}&offset=${offset}`;

    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`API error ${resp.status}`);
        const data = await resp.json();
        const articles = data.results || [];

        if (!articles.length) {
            blogContainer.innerHTML = '<p class="empty-message">No articles found for this page.</p>';
            return;
        }

        blogContainer.innerHTML = articles.map(article => `
            <article class="blog-card">
                <img src="${article.image_url}" alt="${article.title}" loading="lazy"
                     onerror="this.src='https://placehold.co/600x300/0b0f19/6C63FF?text=Space+News';">
                <div class="blog-card-content">
                    <h3>${article.title}</h3>
                    <p>${(article.summary || '').substring(0, 150)}…</p>
                    <a href="${article.url}" target="_blank" rel="noopener" class="btn-secondary">Read More</a>
                </div>
            </article>
        `).join('');

    } catch (err) {
        console.error('Blog fetch error:', err);
        blogContainer.innerHTML = '<p class="empty-message">Could not load articles. Please try again later.</p>';
    }
}

// 3. Build pagination buttons
function renderPagination() {
    const pagesHTML = buildPaginationHTML();
    paginationTop.innerHTML = pagesHTML;
    paginationBottom.innerHTML = pagesHTML;

    document.querySelectorAll('.pagination-bar').forEach(bar => {
        bar.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const page = parseInt(this.dataset.page, 10);
                if (page === currentPage) return;
                currentPage = page;
                fetchPage(currentPage);
                renderPagination();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    });
}

function buildPaginationHTML() {
    let html = '';
    const maxVisible = 7;

    html += `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''} aria-label="Previous page">‹ Prev</button>`;

    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = startPage + maxVisible - 1;
    if (endPage > MAX_PAGES) {
        endPage = MAX_PAGES;
        startPage = Math.max(1, endPage - maxVisible + 1);
    }

    if (startPage > 1) {
        html += `<button class="page-btn" data-page="1">1</button>`;
        if (startPage > 2) html += `<span class="page-ellipsis">…</span>`;
    }

    for (let p = startPage; p <= endPage; p++) {
        html += `<button class="page-btn${p === currentPage ? ' active' : ''}" data-page="${p}">${p}</button>`;
    }

    if (endPage < MAX_PAGES) {
        if (endPage < MAX_PAGES - 1) html += `<span class="page-ellipsis">…</span>`;
        html += `<button class="page-btn" data-page="${MAX_PAGES}">${MAX_PAGES}</button>`;
    }

    html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === MAX_PAGES ? 'disabled' : ''} aria-label="Next page">Next ›</button>`;

    return html;
}

// 4. Initialise
window.addEventListener('DOMContentLoaded', () => {
    fetchPage(currentPage).then(() => renderPagination());
});
    </script>
</body>
